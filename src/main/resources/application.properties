spring.application.name=mine

# 1. MySQL 연결 정보
spring.datasource.username=${MY_DB_USER}
spring.datasource.password=${MY_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MY_DB_HOST}:3306/minedb?serverTimezone=Asia/Seoul

# 2. JPA/Hibernate 설정 (엔티티를 바탕으로 테이블 자동 생성)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true